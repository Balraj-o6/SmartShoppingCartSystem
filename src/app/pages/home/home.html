<div class="app-container">

  <header class="main-header">
    <h1>Welcome to the Smart Shopping Cart System</h1>
    <p>A modern solution for managing your shopping cart</p>
  </header>

  <app-notification></app-notification>

  <div class="main-grid">
    <H2>Featured Products</H2>
    <div class="product-grid">

      <div class="product-card" *ngFor="let product of products">

        <img [src]="product.imageUrl || 'https://via.placeholder.com/150'" alt="product" />

        <h3>{{ product.name }}</h3>

        <p>{{ product.description }}</p>

        <div class="price-stock">
          <span>${{ product.price }}</span>
          <span>Stock: {{ product.stock }}</span>
        </div>

        <div class="rating">
          ⭐ {{ product.rating }}
        </div>

        <button class="add-btn" [disabled]="product.stock === 0" (click)="addToCart(product)">
          Add To Cart
        </button>

      </div>

    </div>

    <div class="stats">
      <app-quick-stats></app-quick-stats>
    </div>

  </div>

</div>
