<div class="card">

    <h2>Shopping Cart</h2>

    <p class="cart-count">
        Total Items: {{ cartCount }}
    </p>

    <div *ngIf="cartItems.length === 0" class="empty-cart">
        Cart is empty
    </div>

    <div class="cart-item" *ngFor="let item of cartItems">

        <div class="product-info">
            <img [src]="item.product.imageUrl" alt="{{ item.product.name }}" class="product-image" />
            <h4>{{ item.product.name }}</h4>
            <p>${{ item.product.price }}</p>
        </div>

        <div class="quantity-section">
            <input type="number" min="1" [value]="item.quantity" (change)="updateQuantity(item.productId, $event)" />

            <button class="remove-btn" (click)="removeItem(item.productId)">
                Remove
            </button>
        </div>

    </div>

    <div class="discount-section">
        <input type="text" [(ngModel)]="discountCode" placeholder="Enter discount code" />

        <button (click)="applyDiscount()">
            Apply
        </button>
    </div>

    <div class="summary-box">

        <p>Subtotal: ${{ subtotal }}</p>
        <p>Tax: ${{ tax }}</p>
        <p>Discount: {{ discount }}%</p>

        <h3>Total: ${{ total }}</h3>

    </div>

    <div class="cart-buttons">

        <button class="clear-btn" (click)="clearCart()">
            Clear Cart
        </button>

        <button class="checkout-btn" (click)="checkout()">
            Checkout
        </button>

    </div>

</div>
